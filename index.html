<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Museo virtual interactivo de Argentinos Juniors — recorré la historia del Bicho." />
  <title>Museo Virtual — Argentinos Juniors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="#/" class="brand" aria-label="Inicio del museo">
      <span class="brand-shield" aria-hidden="true">
        <img src="escudo.svg" alt="Escudo Argentinos Juniors" width="42" height="50" />
      </span>
      <span class="brand-text">
        <span class="brand-title">Museo Virtual</span>
        <span class="brand-sub">Argentinos Juniors · 1904</span>
      </span>
    </a>
    <nav class="site-nav" aria-label="Navegación principal">
      <a href="#/sala" data-route="sala">Sala virtual</a>
      <a href="#/jugadores" data-route="jugadores">Jugadores</a>
      <a href="#/partidos" data-route="partidos">Partidos</a>
      <a href="#/goles" data-route="goles">Goles</a>
      <a href="#/camisetas" data-route="camisetas">Camisetas</a>
      <a href="#/hitos" data-route="hitos">Línea de tiempo</a>
    </nav>
    <button class="nav-toggle" aria-label="Abrir menú" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main id="app" class="app-main" tabindex="-1">
    <!-- Las vistas se renderizan acá -->
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div>
        <p class="footer-title">Museo Virtual · AAAJ</p>
        <p class="footer-sub">Prototipo · Recorré 120 años del Bicho</p>
      </div>
      <div class="footer-meta">
        <p>Argentinos Juniors · La Paternal, Buenos Aires</p>
        <p>Fundado el 15 de agosto de 1904</p>
      </div>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
